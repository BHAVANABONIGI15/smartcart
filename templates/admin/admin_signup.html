{% extends 'base.html' %}

{% block title %}Admin Signup{% endblock %}

{% block content %}

<style>

.signup-card{
    border:none;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

.signup-header{
    background:linear-gradient(135deg,#131921,#232f3e);
    padding:20px;
    text-align:center;
}

.signup-header h3{
    color:white;
    font-weight:700;
    margin-bottom:8px;
}

.signup-header p{
    color:#d1d5db;
    margin-bottom:0;
    font-size:14px;
}

.form-control{
    border-radius:10px;
}

.input-field{
    height:45px;
}

.otp-btn{
    background:#ff9900;
    color:black;
    font-weight:700;
    padding:12px;
    border-radius:10px;
    border:none;
    width:100%;
}

.login-link{
    text-decoration:none;
    font-weight:bold;
}

.login-link:hover{
    text-decoration:underline;
}

/* Mobile Responsive */

@media(max-width:768px){

    .signup-header{
        padding:18px 15px;
    }

    .signup-header h3{
        font-size:24px;
    }

    .signup-header p{
        font-size:13px;
    }

    .card-body{
        padding:20px !important;
    }

    .input-field{
        height:42px;
    }

    .otp-btn{
        padding:10px;
    }

}

</style>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-lg-5 col-md-7 col-sm-10 col-12">

            <div class="card signup-card mt-3">

                <!-- Header -->

                <div class="signup-header">

                    <h3>
                        👨‍💼 Admin Registration
                    </h3>

                    <p>
                        Create your SmartCart Admin Account
                    </p>

                </div>

                <!-- Form -->

                <div class="card-body p-3">

                    <form method="POST"
                          action="/admin-signup">

                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                Full Name
                            </label>

                            <input type="text"
                                   name="name"
                                   class="form-control input-field"
                                   placeholder="Enter your full name"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                Email Address
                            </label>

                            <input type="email"
                                   name="email"
                                   class="form-control input-field"
                                   placeholder="Enter your email"
                                   required>

                        </div>

                        <button type="submit"
                                class="otp-btn">

                            📩 Send OTP

                        </button>

                    </form>

                    <hr class="my-3">

                    <div class="text-center">

                        <p class="mb-1 text-muted">

                            Already have an account?

                        </p>

                        <a href="/admin-login"
                           class="login-link">

                            Login Here

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
