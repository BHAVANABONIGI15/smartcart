{% extends 'base.html' %}

{% block title %}Update Product{% endblock %}

{% block content %}

<style>

.update-card{
    border:none;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

.update-header{
    background:linear-gradient(135deg,#131921,#232f3e);
    padding:25px;
    text-align:center;
}

.update-header h3{
    color:white;
    font-weight:700;
    margin-bottom:8px;
}

.update-header p{
    color:#d1d5db;
    margin-bottom:0;
    font-size:14px;
}

.input-field{
    height:45px;
    border-radius:10px;
}

.form-control{
    border-radius:10px;
}

.product-image{
    max-height:180px;
    border-radius:12px;
    border:1px solid #ddd;
    padding:8px;
    max-width:100%;
}

.update-btn{
    background:#ff9900;
    color:black;
    font-weight:700;
    padding:12px;
    border-radius:10px;
    border:none;
    width:100%;
}

.product-list-btn{
    background:#232f3e;
    color:white;
    border-radius:10px;
    padding:10px 20px;
    font-weight:600;
    text-decoration:none;
    display:inline-block;
}

.product-list-btn:hover{
    color:white;
}

/* Responsive */

@media(max-width:768px){

    .update-header{
        padding:20px 15px;
    }

    .update-header h3{
        font-size:24px;
    }

    .update-header p{
        font-size:13px;
    }

    .card-body{
        padding:20px !important;
    }

    .input-field{
        height:42px;
    }

    .product-image{
        max-height:140px;
    }

    .product-list-btn{
        width:100%;
        text-align:center;
    }

}

</style>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-lg-7 col-md-9 col-sm-11 col-12">

            <div class="card update-card mt-4">

                <!-- Header -->

                <div class="update-header">

                    <h3>
                        ✏️ Update Product
                    </h3>

                    <p>
                        Edit and manage product information
                    </p>

                </div>

                <!-- Form -->

                <div class="card-body p-4">

                    <form method="POST"
                          action="/admin/update-item/{{ product.product_id }}"
                          enctype="multipart/form-data">

                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                Product Name
                            </label>

                            <input type="text"
                                   name="name"
                                   value="{{ product.name }}"
                                   class="form-control input-field"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                Description
                            </label>

                            <textarea name="description"
                                      class="form-control"
                                      rows="4"
                                      required>{{ product.description }}</textarea>

                        </div>

                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                Category
                            </label>

                            <input type="text"
                                   name="category"
                                   value="{{ product.category }}"
                                   class="form-control input-field"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                Price (₹)
                            </label>

                            <input type="number"
                                   step="0.01"
                                   name="price"
                                   value="{{ product.price }}"
                                   class="form-control input-field"
                                   required>

                        </div>

                        <div class="mb-4 text-center">

                            <label class="form-label fw-bold d-block">
                                Current Product Image
                            </label>

                            <img src="/static/uploads/product_images/{{ product.image }}"
                                 class="img-fluid product-image">

                        </div>

                        <div class="mb-4">

                            <label class="form-label fw-bold">
                                Upload New Image (Optional)
                            </label>

                            <input type="file"
                                   name="image"
                                   accept="image/*"
                                   class="form-control">

                        </div>

                        <button type="submit"
                                class="update-btn">

                            💾 Update Product

                        </button>

                    </form>

                    <hr>

                    <div class="text-center">

                        <a href="/admin/item-list"
                           class="product-list-btn">

                            📋 Product List

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
