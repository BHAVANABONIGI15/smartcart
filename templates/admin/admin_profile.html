{% extends 'base.html' %}

{% block title %}Admin Profile{% endblock %}

{% block content %}

<style>

.profile-card{
    border:none;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

.profile-header{
    background:linear-gradient(135deg,#131921,#232f3e);
    padding:25px;
    text-align:center;
}

.profile-header h3{
    color:white;
    font-weight:700;
    margin-bottom:8px;
}

.profile-header p{
    color:#d1d5db;
    margin-bottom:0;
    font-size:14px;
}

.profile-image{
    width:130px;
    height:130px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #e5e7eb;
}

.default-avatar{
    width:130px;
    height:130px;
    margin:auto;
    border-radius:50%;
    background:#f1f5f9;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:50px;
    border:4px solid #e5e7eb;
}

.form-control{
    border-radius:10px;
}

.input-field{
    height:45px;
}

.update-btn{
    background:#ff9900;
    color:black;
    font-weight:700;
    padding:12px;
    border-radius:10px;
    border:none;
    width:100%;
}

.dashboard-btn{
    background:#232f3e;
    color:white;
    border-radius:10px;
    padding:10px 20px;
    font-weight:600;
    text-decoration:none;
    display:inline-block;
}

.dashboard-btn:hover{
    color:white;
}

@media(max-width:768px){

    .profile-header{
        padding:20px 15px;
    }

    .profile-header h3{
        font-size:24px;
    }

    .profile-header p{
        font-size:13px;
    }

    .card-body{
        padding:20px !important;
    }

    .profile-image,
    .default-avatar{
        width:110px;
        height:110px;
    }

    .default-avatar{
        font-size:40px;
    }

    .input-field{
        height:42px;
    }

    .dashboard-btn{
        width:100%;
        text-align:center;
    }

}

</style>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-lg-6 col-md-8 col-sm-11 col-12">

            <div class="card profile-card mt-4">

                <!-- Header -->

                <div class="profile-header">

                    <h3>
                        👨‍💼 Admin Profile
                    </h3>

                    <p>
                        Manage your SmartCart account
                    </p>

                </div>

                <!-- Profile Body -->

                <div class="card-body p-4">

                    <div class="text-center mb-4">

                        {% if admin.profile_image %}

                            <img src="/static/uploads/admin_profiles/{{ admin.profile_image }}"
                                 class="profile-image">

                        {% else %}

                            <div class="default-avatar">

                                👤

                            </div>

                        {% endif %}

                    </div>

                    <form method="POST"
                          action="/admin/profile"
                          enctype="multipart/form-data">

                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                Full Name
                            </label>

                            <input type="text"
                                   name="name"
                                   value="{{ admin.name }}"
                                   class="form-control input-field"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                Email Address
                            </label>

                            <input type="email"
                                   name="email"
                                   value="{{ admin.email }}"
                                   class="form-control input-field"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                New Password
                            </label>

                            <input type="password"
                                   name="password"
                                   class="form-control input-field"
                                   placeholder="Leave blank to keep current password">

                        </div>

                        <div class="mb-4">

                            <label class="form-label fw-bold">
                                Upload Profile Image
                            </label>

                            <input type="file"
                                   name="profile_image"
                                   accept="image/*"
                                   class="form-control">

                        </div>

                        <button type="submit"
                                class="update-btn">

                            💾 Update Profile

                        </button>

                    </form>

                    <hr>

                    <div class="text-center">

                        <a href="/admin-dashboard"
                           class="dashboard-btn">

                            🏠 Admin Dashboard

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
