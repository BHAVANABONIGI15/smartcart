{% extends 'base.html' %}

{% block title %}User Registration{% endblock %}

{% block content %}

<style>

.register-container{
    padding:20px;
}

.register-card{
    border:none;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

.register-header{
    background:linear-gradient(135deg,#0f172a,#1e3a5f);
    padding:25px;
    text-align:center;
}

.register-header h3{
    color:white;
    font-weight:700;
    margin-bottom:8px;
}

.register-header p{
    color:#e2e8f0;
    margin-bottom:0;
    font-size:14px;
}

.register-body{
    padding:25px;
}

.form-label{
    font-weight:600;
}

.form-control{
    height:48px;
    border-radius:10px;
}

.otp-btn{
    width:100%;
    background:#0d6efd;
    color:white;
    border:none;
    padding:12px;
    border-radius:10px;
    font-weight:600;
    transition:0.3s;
}

.otp-btn:hover{
    background:#0b5ed7;
}

.login-link{
    text-decoration:none;
    font-weight:bold;
}

/* Mobile Responsive */

@media(max-width:768px){

    .register-container{
        padding:10px;
    }

    .register-header{
        padding:20px 15px;
    }

    .register-header h3{
        font-size:24px;
    }

    .register-body{
        padding:20px 15px;
    }

    .form-control{
        height:45px;
        font-size:14px;
    }

    .otp-btn{
        padding:10px;
    }

}

</style>

<div class="container register-container">

    <div class="row justify-content-center">

        <div class="col-lg-5 col-md-7 col-sm-10 col-12">

            <div class="card register-card mt-3">

                <!-- Header -->

                <div class="register-header">

                    <h3>
                        👤 User Registration
                    </h3>

                    <p>
                        Create your SmartCart Account
                    </p>

                </div>

                <!-- Form -->

                <div class="register-body">

                    <form method="POST"
                          action="/user-register">

                        <div class="mb-3">

                            <label class="form-label">
                                Full Name
                            </label>

                            <input type="text"
                                   name="name"
                                   class="form-control"
                                   placeholder="Enter your full name"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Email Address
                            </label>

                            <input type="email"
                                   name="email"
                                   class="form-control"
                                   placeholder="Enter your email"
                                   required>

                        </div>

                        <button type="submit"
                                class="otp-btn">

                            📩 Send OTP

                        </button>

                    </form>

                    <hr class="my-3">

                    <div class="text-center">

                        <p class="mb-1 text-muted">
                            Already have an account?
                        </p>

                        <a href="/user-login"
                           class="login-link">

                            Login Here

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
